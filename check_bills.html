<!DOCTYPE html>
<html>
<head>
  <title>Check Bills Data</title>
</head>
<body>
  <h1>ກວດສອບຂໍ້ມູນ Bills</h1>
  <pre id="output"></pre>
  
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    
    const supabase = createClient(
      'https://erueurkqzmtdefszqons.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVydWV1cmtxem10ZGVmc3pxb25zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTA2OTksImV4cCI6MjA4ODc2NjY5OX0.uShip2ECxvFPfmDLx9-adHGXXTc3cazVdZpSF2tCFUw'
    )
    
    async function check() {
      const output = document.getElementById('output')
      output.textContent = 'ກຳລັງກວດສອບ...'\n
      
      // ກວດ ar_bills
      const { data: bills, count: billsCount, error: billsError } = await supabase
        .from('ar_bills')
        .select('*', { count: 'exact' })
        .limit(5)
      
      output.textContent += `\n=== ar_bills ===\n`
      output.textContent += `Count: ${billsCount}\n`
      output.textContent += `Error: ${billsError?.message || 'None'}\n`
      output.textContent += `Data: ${JSON.stringify(bills, null, 2)}\n`
      
      // ກວດ ar_debt
      const { data: debt, count: debtCount, error: debtError } = await supabase
        .from('ar_debt')
        .select('*', { count: 'exact' })
        .limit(5)
      
      output.textContent += `\n=== ar_debt ===\n`
      output.textContent += `Count: ${debtCount}\n`
      output.textContent += `Error: ${debtError?.message || 'None'}\n`
      output.textContent += `Data: ${JSON.stringify(debt, null, 2)}\n`
    }
    
    check()
  </script>
</body>
</html>
